name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build pytest

      - name: Install package (dev mode)
        run: |
          pip install -e .

      - name: Run unit tests
        run: |
          pytest tests/test_runner.py tests/test_persona_build.py tests/test_settings.py tests/test_stateless_frame.py tests/test_heuristic_agent.py tests/test_llm_operator.py -v
